name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Base release tag (vX.Y.Z)"
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian
          - { name: debian-x64,     arch: x64,     format: debian }
          - { name: debian-arm64,   arch: arm64,   format: debian }
          - { name: debian-armv7l,  arch: armv7l,  format: debian }

          # RPM
          - { name: rpm-x64,        arch: x64,     format: rpm }
          - { name: rpm-arm64,      arch: arm64,   format: rpm }

          # Pacman
          - { name: pacman-x64,     arch: x64,     format: pacman }
          - { name: pacman-arm64,   arch: arm64,   format: pacman }

          # Tarball
          - { name: tarball-x64,    arch: x64,     format: tarball }
          - { name: tarball-arm64,  arch: arm64,   format: tarball }
          - { name: tarball-armv7l, arch: armv7l,  format: tarball }

          # AppImage
          - { name: appimage-x64,   arch: x64,     format: appimage }
          - { name: appimage-arm64, arch: arm64,   format: appimage }
          - { name: appimage-armv7l,arch: armv7l,  format: appimage }

          # Snap
          - { name: snap-x64,       arch: x64,     format: snap }
          - { name: snap-armv7l,    arch: armv7l,  format: snap }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y strip-nondeterminism libarchive-tools

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --loglevel=info

      - name: Fetch & Compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run fetch
          bun run webpack:prod

      - name: Package
        run: node release-automation/build.js --${{ matrix.format }} --${{ matrix.arch }} --production

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.name }}
          path: dist/*
          retention-days: 1

  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: modern,               args: "--mac --universal" }
          - { name: legacy-10.13-10.14,   args: "--mac-legacy-10.13-10.14 --x64" }
          - { name: legacy-10.15,         args: "--mac-legacy-10.15 --x64" }
          - { name: legacy-11,            args: "--mac-legacy-11 --x64" }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --loglevel=info

      - name: Fetch & Compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run fetch
          bun run webpack:prod

      - name: Package
        run: node release-automation/build.js ${{ matrix.args }} --production

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.name }}
          path: dist/*.dmg
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: nsis-x64,      args: "--windows --x64" }
          - { name: nsis-ia32,     args: "--windows --ia32" } 
          - { name: nsis-arm64,    args: "--windows --arm64" }
          - { name: portable-x64,  args: "--windows-portable --x64" }
          - { name: portable-ia32, args: "--windows-portable --ia32" } 
          - { name: legacy-x64,    args: "--windows-legacy --x64" }
          - { name: legacy-ia32,   args: "--windows-legacy --ia32" } 
          - { name: appx-x64,      args: "--microsoft-store --appx --x64" }
          - { name: appx-arm64,    args: "--microsoft-store --appx --arm64" } 
          - { name: appx-ia32,     args: "--microsoft-store --appx --ia32" }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false
          path: repo

      - name: "Move repository to D: drive"
        run: |
          Copy-Item -Path repo -Destination D:\repo -Recurse
          Remove-Item -Path repo -Recurse -Force
        shell: pwsh

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: "Configure Bun cache"
        run: |
          echo "BUN_INSTALL_CACHE_DIR=D:\bun-cache" >> $GITHUB_ENV
          echo "BUN_INSTALL_GLOBAL_DIR=D:\bun-global" >> $GITHUB_ENV

      - name: Install & Build
        working-directory: D:\repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun install --loglevel=info
          bun run fetch
          bun run webpack:prod

      - name: Package
        working-directory: D:\repo
        run: node release-automation/build.js ${{ matrix.args }} --production

      - name: Sign Windows
        working-directory: D:\repo
        run: deepsigntool\sign_windows.cmd

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.name }}
          path: |
            D:/repo/dist/*.exe
            D:/repo/dist/*.appx
            D:/repo/windows_signed/*.exe
          retention-days: 1

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Flatten directory
        run: |
          mkdir -p ./release-files
          find ./all-artifacts -type f \( \
            -name "*.deb" -o -name "*.rpm" -o -name "*.pkg.tar.zst" -o \
            -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.snap" -o \
            -name "*.dmg" -o -name "*.exe" -o -name "*.appx" \
          \) -exec cp {} ./release-files/ \;

      - name: Upload to GitHub Release
        uses: xresloader/upload-to-github-release@v1
        with:
          file: "release-files/*"
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        uses: pozetroninc/github-action-get-latest-release@master
        id: latest
        with:
          repository: ${{ github.repository }}
          excludes: draft
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch Android
        uses: peter-evans/repository-dispatch@v3
        with:
            token: ${{ secrets.ORG_DISPATCH_TOKEN }}          
            repository: ${{ github.repository_owner }}/02engine-android 
            event-type: publish-android                        
            client-payload: '{"tag": "${{ steps.latest.outputs.release }}"}'

  publish-snap:
    runs-on: ubuntu-latest
    needs: [publish-release]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish Snaps to Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        run: |
          # 查找所有下载下来的 .snap 文件
          SNAP_FILES=$(find ./all-artifacts -name "*.snap")
          
          if [ -z "$SNAP_FILES" ]; then
            echo "No .snap files found!"
            exit 1
          fi

          # 循环发布每一个文件到 stable 通道
          for FILE in $SNAP_FILES; do
            echo "Uploading $FILE..."
            snapcraft upload "$FILE" --release=stable
          done